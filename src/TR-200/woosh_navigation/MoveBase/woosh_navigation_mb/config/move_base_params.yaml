# ================================================================
# move_base 파라미터 — Woosh TR-200
# ================================================================
# TR-200 사양: 차동 구동, 최대 선속도 0.12 m/s, WebSocket 통신 ~100ms 지연

# ----------------------------------------------------------------
# 컨트롤러 주기
# controller_frequency: 5.0 Hz
#   WebSocket 왕복 지연(~100ms)을 감안하여 20Hz 대신 5Hz 사용
#   로봇 실제 응답이 느리므로 높은 주기는 무의미
# ----------------------------------------------------------------
controller_frequency: 5.0

# ----------------------------------------------------------------
# 플래너 주기
# ----------------------------------------------------------------
planner_frequency: 1.0        # Hz — 전역 경로는 낮은 빈도로 충분
planner_patience: 5.0         # 초 — 전역 경로 탐색 최대 대기 시간

# ----------------------------------------------------------------
# 복구 동작
# ----------------------------------------------------------------
recovery_behavior_enabled: true
clearing_rotation_allowed: false  # 제자리 회전 복구 비활성화 [#009]
                                   # 배경: rotate_cw 복구가 0.1 rad/s(DWA acc_lim×sim_period 한계)로
                                   # 실행되어 전체 항법 시간의 57%를 제자리 회전에 낭비.
                                   # 비활성화 시 costmap_reset → global_planner re-plan 경로로
                                   # 더 빠르게 복구 시도.
conservative_reset_dist: 3.0      # 이 거리 내 장애물만 보수적 초기화

oscillation_timeout: 60.0         # 초 — 진동 감지 타임아웃
                                   # (10.0→30.0) [#008]: 0.1 rad/s × 30s = 3 rad(172°) 커버
                                   # (30.0→60.0) [#009]: 첫 rotate_cw 발동이 127.2s(elapsed)로
                                   # oscillation_timeout=30s에도 조기 발동 확인.
                                   # path_distance_bias 완화(14→8)와 병행하여 내성 강화.
oscillation_distance: 0.5         # m — 이 거리 이상 이동하면 진동 카운터 초기화
                                   # (0.2→0.3) [#008]: 저속 전진(0.06 m/s) 시 조기 누적 방지
                                   # (0.3→0.5) [#009]: 0.05 m/s × 10s = 0.5m
                                   # 약 10초마다 카운터 초기화 → false positive 추가 억제

# ----------------------------------------------------------------
# 목표 도달 허용 오차
# ----------------------------------------------------------------
shutdown_costmaps: false           # 목표 도달 후 costmap 유지 (재탐색 대비)
