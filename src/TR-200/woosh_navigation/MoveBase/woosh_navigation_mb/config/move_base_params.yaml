# ================================================================
# move_base 파라미터 — Woosh TR-200
# ================================================================
# TR-200 사양: 차동 구동, 최대 선속도 0.12 m/s, WebSocket 통신 ~100ms 지연

# ----------------------------------------------------------------
# 컨트롤러 주기
# controller_frequency: 5.0 Hz
#   WebSocket 왕복 지연(~100ms)을 감안하여 20Hz 대신 5Hz 사용
#   로봇 실제 응답이 느리므로 높은 주기는 무의미
# ----------------------------------------------------------------
controller_frequency: 5.0

# ----------------------------------------------------------------
# 플래너 주기
# ----------------------------------------------------------------
planner_frequency: 1.0        # Hz — 전역 경로는 낮은 빈도로 충분
planner_patience: 5.0         # 초 — 전역 경로 탐색 최대 대기 시간

# ----------------------------------------------------------------
# 복구 동작
# ----------------------------------------------------------------
recovery_behavior_enabled: true
clearing_rotation_allowed: true   # 제자리 회전으로 복구 허용
conservative_reset_dist: 3.0      # 이 거리 내 장애물만 보수적 초기화

oscillation_timeout: 10.0         # 초 — 진동 감지 타임아웃
oscillation_distance: 0.2         # m — 이 거리 이상 이동하면 진동 카운터 초기화

# ----------------------------------------------------------------
# 목표 도달 허용 오차
# ----------------------------------------------------------------
shutdown_costmaps: false           # 목표 도달 후 costmap 유지 (재탐색 대비)
