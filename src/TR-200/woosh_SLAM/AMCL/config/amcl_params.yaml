# ================================================================
# AMCL 파라미터 — Woosh TR-200 (0.65m x 0.45m, 차동 구동)
# ================================================================
# 프레임 이름은 amcl.launch에서 인자로 오버라이드됩니다.
# 여기서는 AMCL 알고리즘 파라미터만 설정합니다.

# ----------------------------------------------------------------
# 파티클 필터 (Particle Filter)
# ----------------------------------------------------------------
min_particles: 500          # 최소 파티클 수
max_particles: 3000         # 최대 파티클 수 (NUC 성능 고려)
kld_err: 0.02               # KLD 샘플링 오차 허용치
kld_z: 0.99                 # KLD 샘플링 신뢰도

# 업데이트 트리거 조건 (너무 잦으면 CPU 과부하)
update_min_d: 0.05          # 5cm 이동 시 업데이트
update_min_a: 0.1745        # 약 10° 회전 시 업데이트 (pi/18)
resample_interval: 2        # 2번의 필터 업데이트마다 리샘플링

# 글로벌 로컬리제이션 실패 복구
recovery_alpha_slow: 0.001  # 느린 평균 가중치 감쇠율
recovery_alpha_fast: 0.1    # 빠른 평균 가중치 감쇠율 (복구 감지)

gui_publish_rate: 10.0      # RViz 파티클 시각화 발행 주기 (Hz)

# ----------------------------------------------------------------
# 레이저 모델 (Laser Model)
# likelihood_field: 실내 환경에서 beam보다 강건함
# ----------------------------------------------------------------
laser_model_type: likelihood_field
laser_max_beams: 60         # 서브샘플링 (전체 스캔 사용 시 CPU 과부하)
laser_z_hit: 0.95           # hit 모델 가중치
laser_z_rand: 0.05          # 랜덤 노이즈 가중치
laser_sigma_hit: 0.2        # hit 모델 가우시안 표준편차 (m)
laser_likelihood_max_dist: 2.0  # likelihood field 최대 거리 (m)

# ----------------------------------------------------------------
# 오도메트리 모델 (Odometry Model) — 차동 구동
# alpha 값이 클수록 오도메트리 노이즈가 크다고 가정
# SDK twist 데이터는 합성 오도메트리이므로 보수적으로 설정
# ----------------------------------------------------------------
odom_model_type: diff
odom_alpha1: 0.3    # 회전으로 인한 회전 노이즈
odom_alpha2: 0.3    # 이동으로 인한 회전 노이즈
odom_alpha3: 0.2    # 이동으로 인한 이동 노이즈
odom_alpha4: 0.2    # 회전으로 인한 이동 노이즈

# ----------------------------------------------------------------
# 초기 포즈 (Initial Pose)
# RViz의 "2D Pose Estimate" 버튼 또는 /initialpose 토픽으로 변경 가능
# ----------------------------------------------------------------
initial_pose_x: 0.0
initial_pose_y: 0.0
initial_pose_a: 0.0
initial_cov_xx: 0.25    # 초기 위치 불확실도 x (0.5m 표준편차)
initial_cov_yy: 0.25    # 초기 위치 불확실도 y
initial_cov_aa: 0.0685  # 초기 각도 불확실도 (약 15° 표준편차)

# ----------------------------------------------------------------
# 변환 허용 오차
# WebSocket 통신 지연(~100ms)을 고려하여 여유있게 설정
# ----------------------------------------------------------------
transform_tolerance: 0.5    # TF 유효 시간 허용 오차 (초)
