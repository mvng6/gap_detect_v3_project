# ================================================================
# GMapping 파라미터 — Woosh TR-200 (0.65m × 0.45m, 차동 구동)
# NUC CPU 성능에 최적화된 설정
#
# AMCL(amcl_params.yaml)과의 대응:
#   delta          ↔  (woosh_map.yaml의 resolution: 0.03)
#   particles 30   ↔  AMCL min_particles: 500  (GMapping은 Rao-Blackwellized)
#   linearUpdate   ↔  amcl update_min_d
#   angularUpdate  ↔  amcl update_min_a
#   srr/srt/str/stt ↔ amcl odom_alpha1~4
# ================================================================

# ----------------------------------------------------------------
# 지도 설정
# ----------------------------------------------------------------
delta: 0.03        # 지도 해상도 (m/cell) — 기존 woosh_map.pgm(0.03m)과 동일
xmin: -12.0        # 지도 x 최솟값 (m)
ymin: -12.0        # 지도 y 최솟값 (m)
xmax:  12.0        # 지도 x 최댓값 (m)
ymax:  12.0        # 지도 y 최댓값 (m)
# 기존 환경 크기: 554×570 픽셀 × 0.03m ≈ 16.6m × 17.1m
# ±12.0m 범위는 기존 환경을 충분히 포함하며 자동 확장됨

# ----------------------------------------------------------------
# 파티클 필터
# 주의: GMapping 각 파티클은 전체 지도 가설을 유지하므로 (Rao-Blackwellized)
#       AMCL(500~3000)보다 훨씬 적은 수를 사용해야 합니다.
# NUC 기준 권장: 20~50
# ----------------------------------------------------------------
particles: 30

# ----------------------------------------------------------------
# 업데이트 트리거
# AMCL(0.05m / 0.1745rad)보다 큰 값으로 설정:
#   GMapping은 업데이트당 스캔 매칭 비용이 높으므로 빈도를 낮춥니다.
# ----------------------------------------------------------------
linearUpdate: 0.1      # 10cm 이동 시 스캔 매칭 트리거
angularUpdate: 0.2618  # 약 15° 회전 시 스캔 매칭 트리거 (π/12 ≈ 0.2618 rad)
temporalUpdate: -1.0   # 비활성화: 정지 시 불필요한 CPU 소모 방지

# ----------------------------------------------------------------
# 레이저 파라미터
# ----------------------------------------------------------------
maxRange: 10.0    # 레이저 최대 물리 범위 (m)
maxUrange: 8.0    # 레이저 유효 사용 범위 (m)
                  # 원거리 측정값은 노이즈가 크므로 맵 품질 저하 방지를 위해 단축

# ----------------------------------------------------------------
# 스캔 매처 파라미터 (ICP 기반 스캔-맵 정합)
# ----------------------------------------------------------------
sigma: 0.05        # 스캔 매처 가우시안 커널 표준편차 (m)
kernelSize: 1      # 검색 커널 반경 (셀 단위, 1 = 3×3 이웃)
lstep: 0.05        # 선형 방향 경사 하강 스텝 크기 (m)
astep: 0.05        # 각도 방향 경사 하강 스텝 크기 (rad)
iterations: 5      # 스캔 매처 반복 횟수 (정밀도 ↑ → CPU 소모 ↑)

# ----------------------------------------------------------------
# 우도 모델 (스캔-맵 매칭 품질 계산)
# ----------------------------------------------------------------
lsigma: 0.075      # 빔 우도 가우시안 표준편차 (m)
ogain: 3.0         # 우도 평활화 계수 (과도한 재샘플링 억제)
lskip: 0           # 스킵할 빔 수 (0 = 모든 빔 사용)

# ----------------------------------------------------------------
# 재샘플링 임계값
# ----------------------------------------------------------------
resampleThreshold: 0.5  # Neff/particles < 0.5일 때 재샘플링 수행

# ----------------------------------------------------------------
# TF 발행 주기
# Woosh SDK WebSocket 지연(~100ms)을 고려하여 20Hz(0.05s) 설정
# AMCL의 transform_tolerance: 0.5s와 일관성 유지
# ----------------------------------------------------------------
transform_publish_period: 0.05  # map→odom TF 발행 주기 (초)

# ----------------------------------------------------------------
# 오도메트리 노이즈 모델
# 합성 오도메트리(twist 수치 적분)이므로 보수적으로 설정
# AMCL odom_alpha와 개념적 대응:
#   srr ↔ alpha3 (이동→이동 노이즈)
#   srt ↔ alpha2 (이동→회전 노이즈)
#   str ↔ alpha4 (회전→이동 노이즈)
#   stt ↔ alpha1 (회전→회전 노이즈)
# ----------------------------------------------------------------
srr: 0.1    # 이동으로 인한 이동 노이즈 비율
srt: 0.2    # 이동으로 인한 회전 노이즈 비율
str: 0.1    # 회전으로 인한 이동 노이즈 비율
stt: 0.2    # 회전으로 인한 회전 노이즈 비율
